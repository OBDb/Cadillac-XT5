generations:
  - name: "First Generation"
    start_year: 2016
    end_year: 2019
    description: "The Cadillac XT5 (Crossover Touring 5) is a compact luxury crossover SUV manufactured by General Motors. It replaced the Cadillac SRX when launched in early 2016. Built on GM's C1XX platform, it features Cadillac's Art & Science design language with crisp lines and distinctive vertical lighting elements. Initially powered exclusively by a 3.6L V6 engine producing 310 HP paired with an eight-speed automatic transmission. Both front-wheel drive and all-wheel drive configurations are available. The interior features a driver-focused design with premium materials including leather, aluminum, and real wood accents, with Cadillac's CUE infotainment system. Technology features include a streaming video rear-view mirror, 360-degree camera system, and driver assistance features. Manufactured at GM's Spring Hill Manufacturing plant in Tennessee, with Chinese-market variants produced in Shanghai by SAIC-GM."

  - name: "First Generation (2020 Facelift)"
    start_year: 2020
    end_year: 2024
    description: "For the 2020 model year, the XT5 received significant mid-cycle updates. The trim levels changed to Cadillac's Y strategy with Luxury as the base, Premium Luxury, and Sport as higher levels. The exterior received minor design changes with new grille treatments on different trims. Most notably, GM's 2.0L turbocharged I4 engine producing 237 HP and 258 lbft torque replaced the previous engine in China and became the new base engine in North America, joining the V6 option. A new rotary controller for the Cadillac CUE infotainment system was added, along with updates to the rear camera mirror and electronic precision shifter. The ninth-speed Hydramatic 9T65 transmission replaced the previous eight-speed unit. This generation remains on the C1XX platform."

  - name: "Second Generation"
    start_year: 2024
    end_year: null
    description: "The second generation Cadillac XT5 was unveiled in China in August 2024 and represents a full redesign. Built on GM's new VSS-S platform (C1-2), featuring updated exterior styling and increased dimensions compared to the first generation. The interior features a 33-inch curved instrument cluster-infotainment combination display, semi-aniline leather seating, wood and aluminum trim, and a floating center console with air-cooled 15W wireless charging. Technology includes 126-color ambient lighting, panoramic sunroof, 9.3-inch digital rearview mirror, and 15-speaker AKG audio system with adaptive high-beam headlights. Powered by a 2.0L turbocharged I4 48V mild hybrid system producing 227 HP, driving through a nine-speed automatic transmission and optional twin-clutch all-wheel drive system. As of 2024, manufacturing is centered in Shanghai, China by Shanghai GM."
